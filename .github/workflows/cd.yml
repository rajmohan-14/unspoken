name: CD

on:
  push:
    branches: [main]

jobs:
  deploy-heroku:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_TARGET == 'heroku' || vars.DEPLOY_TARGET == '' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Heroku configuration
        id: check
        run: |
          if [[ -n "$HEROKU_API_KEY" && -n "$HEROKU_APP_NAME" && -n "$HEROKU_EMAIL" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "Heroku secrets are not configured – skipping deployment."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}

      - name: Install Heroku CLI
        if: steps.check.outputs.configured == 'true'
        run: curl -fsSL https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        if: steps.check.outputs.configured == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:login

      - name: Build and push Docker images to Heroku
        if: steps.check.outputs.configured == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:push web worker beat --app ${{ secrets.HEROKU_APP_NAME }}

      - name: Release Docker images on Heroku
        if: steps.check.outputs.configured == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:release web worker beat --app ${{ secrets.HEROKU_APP_NAME }}

      - name: Run migrations on Heroku
        if: steps.check.outputs.configured == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku run --app ${{ secrets.HEROKU_APP_NAME }} -- python manage.py migrate --noinput
