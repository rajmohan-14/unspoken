<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SilentEcho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">

  <nav class="border-b border-zinc-800 px-6 py-4 flex justify-between items-center sticky top-0 bg-zinc-950/90 backdrop-blur z-50">
    <a href="{% url 'feed' %}" class="text-xl font-serif tracking-tight">
      <span class="inline-block w-2 h-2 rounded-full bg-purple-400 mr-2 animate-pulse"></span>
      SilentEcho
    </a>
    <div class="flex items-center gap-3">
      <!-- Loading indicator -->
      <div id="htmx-spinner" class="htmx-indicator">
        <div class="w-4 h-4 border-2 border-purple-400 border-t-transparent rounded-full animate-spin"></div>
      </div>
      <a href="{% url 'submit_post' %}" class="bg-purple-500 hover:bg-purple-400 text-black text-sm font-medium px-4 py-2 rounded-lg transition">
        + Share something
      </a>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
